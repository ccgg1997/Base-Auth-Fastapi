
services:
  bd:
    container_name: bd
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:  ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fsdb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  bdcli:
    container_name: bdcli
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      bd:
          condition: service_healthy
  
  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: backend.Dockerfile
    restart: always
    ports:
      - "3000:4000"
    environment:
      - database_url=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@bd/${POSTGRES_DB:-fsdb}
      - jwt_secret_key=${JWT_SECRET_KEY}
      - seed_demo_data=${SEED_DEMO_DATA:-true}
    depends_on:
      bd:
          condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:4000/', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ./backend:/app
      - ./mockups-data/Datos_Sinteticos_pacientes.csv:/seed-data/Datos_Sinteticos_pacientes.csv:ro
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
  bot:
    container_name: saludplus-bot
    build:
      context: ./bot
      dockerfile: bot.Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    env_file:
      - ./bot/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata: {}
